<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="perspective-dice-six-faces-four_39561.png">    
    <title>Dados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-chocolate-dark { background-color: #3d2b1f; }
        .bg-chocolate-light { background-color: #fdfaf7; }
        .border-chocolate { border-color: #8b5a2b; }
        .text-chocolate { color: #5d4037; }
    </style>
</head>
<body class="bg-[#fdfaf7] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">

        <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border-b-8 border-[#5d4037]">
            
            <div class="bg-[#3d2b1f] px-8 py-6">
                <h2 class="text-amber-50 text-2xl font-serif font-bold tracking-wide">
                    1. Juego de Dados
                </h2>
                <p class="text-amber-200/70 text-xs uppercase tracking-widest mt-1">
                    Ejercicio de Probabilidad
                </p>
            </div>
            
            <div class="p-8 bg-chocolate-light">
                
                <div class="flex flex-col items-center text-center">
                    
                    <div class="bg-white p-4 rounded-2xl shadow-inner border-2 border-stone-200 mb-8 transform transition hover:rotate-3">
                        <img id="imagenDado" 
                             src="dado1.png" 
                             alt="Dado" 
                             class="w-28 h-28 object-contain transition-all duration-300">
                    </div>

                    <div class="w-full bg-[#efebe9] rounded-xl p-6 mb-8 border-l-4 border-[#8b5a2b] shadow-sm">
                        <p id="textoFrase" class="text-chocolate text-lg font-medium italic leading-relaxed">
                            "Presiona el botón para descubrir tu suerte..."
                        </p>
                        <p id="autorFrase" class="text-[#a1887f] text-sm mt-3 font-bold uppercase tracking-tighter">
                            Inicio
                        </p>
                    </div>

                    <button onclick="lanzarAccion()" 
                            class="group relative w-full py-4 bg-[#5d4037] hover:bg-[#4e342e] text-amber-50 font-bold rounded-xl shadow-lg transition-all active:translate-y-1 active:shadow-none">
                        <span class="relative z-10 flex items-center justify-center gap-2">
                            Lanzar Dado
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:rotate-180 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="height: 24px; width: 24px; M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                        </span>
                    </button>

                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
