<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Concurso | Comparativa de Clasificación</title>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-6 text-slate-800 font-sans">
    
    <a href="../index.html" style="position:fixed; bottom:20px; right:20px; background:#007ecc; color:white; width:50px; height:50px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-radius:50%; font-size:24px; z-index:9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;">🏠</a>

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 my-8">
        
        <div class="bg-white rounded-3xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
            <div class="bg-slate-100 p-4 border-b border-slate-200 text-center">
                <h2 class="text-slate-600 font-extrabold uppercase text-[10px] tracking-widest">Estado Inicial</h2>
            </div>
            <div id="lista-original" class="p-6 space-y-2">
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-blue-100 overflow-hidden flex flex-col ring-4 ring-blue-500/5">
            <div class="bg-blue-600 p-4 text-center shadow-sm">
                <h2 class="text-white font-extrabold uppercase text-[10px] tracking-widest">Clasificación Actualizada</h2>
            </div>
            
            <div class="p-6 flex-1 flex flex-col justify-between">
                <div id="ranking-actual" class="space-y-2 mb-6 min-h-[150px]">
                    <p class="text-slate-400 text-center text-xs italic py-10">Esperando cambios del concurso...</p>
                </div>

                <button onclick="ejecutarConcurso()" id="btn-concursar" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-600/20 active:scale-95 uppercase text-xs tracking-widest">
                    🚀 CONCURSAR
                </button>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
