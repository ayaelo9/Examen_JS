<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Concurso | Comparativa de Clasificación</title>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-6 text-slate-200">
    <a href="../index.html" style="position:fixed; bottom:20px; right:20px; background:#007ecc; color:white; width:50px; height:50px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-radius:50%; font-size:24px; z-index:9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;">🏠</a>

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 overflow-hidden flex flex-col opacity-60 hover:opacity-100 transition-opacity">
            <div class="bg-slate-800 p-4 border-b border-slate-700 text-center">
                <h2 class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Estado Inicial</h2>
            </div>
            <div id="lista-original" class="p-6 space-y-2">
                </div>
        </div>

        <div class="bg-slate-900 rounded-3xl shadow-2xl border border-indigo-500/30 overflow-hidden flex flex-col ring-4 ring-indigo-500/5">
            <div class="bg-indigo-600 p-4 text-center">
                <h2 class="text-white font-bold uppercase text-[10px] tracking-widest">Clasificación Actualizada</h2>
            </div>
            
            <div class="p-6 flex-1">
                <div id="ranking-actual" class="space-y-2 mb-6">
                    <p class="text-slate-500 text-center text-xs italic py-10">Esperando cambios del concurso...</p>
                </div>

                <button onclick="ejecutarConcurso()" id="btn-concursar" 
                    class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-500/20 active:scale-95 uppercase text-xs tracking-widest">
                    🚀 CONCURSAR
                </button>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
