<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="Experiencia.jpg">
    <title>Nivel de Experiencia</title>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-t-8 border-emerald-500 max-w-md w-full">
        <div class="flex justify-center mb-4 text-emerald-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        </div>
        <h2 class="text-center text-gray-800 text-2xl font-black mb-6 uppercase tracking-tight">Registro de Empleado</h2>
        
        <div class="space-y-5">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Nombre Completo</label>
                <input id="nombre" type="text" class="w-full p-4 bg-gray-100 rounded-2xl focus:bg-white border-2 border-transparent focus:border-emerald-500 transition-all outline-none">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Años de experiencia</label>
                <input id="anios" type="number" class="w-full p-4 bg-gray-100 rounded-2xl focus:bg-white border-2 border-transparent focus:border-emerald-500 transition-all outline-none">
            </div>
            
            <button onclick="calcularNivel()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-black rounded-2xl shadow-lg transition-transform active:scale-95">
                ANALIZAR PERFIL
            </button>
        </div>

        <div id="ficha" class="hidden mt-8 p-6 bg-emerald-50 rounded-3xl border-2 border-emerald-100 animate-pulse">
            <p id="resNombre" class="text-emerald-900 font-bold text-lg"></p>
            <p id="resNivel" class="text-emerald-600 font-medium"></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
