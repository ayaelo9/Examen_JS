<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar | Tema Claro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .planet-card { 
            border: 1px solid #f3f4f6; 
            transition: all 0.3s ease;
        }
        .planet-card:hover { 
            background-color: #fafafa;
            border-color: #e5e7eb;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full bg-white border border-gray-100 rounded-3xl shadow-sm p-12">
        
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight uppercase">
                Sistema Solar
            </h1>
            <p class="text-gray-400 text-sm mt-2 tracking-widest uppercase">Explorador de Datos</p>
        </div>

        <div id="contenedor-planetas" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-12 min-h-[200px]">
            <div class="col-span-full text-center py-20 text-gray-200 italic">
                Presiona el botón para listar los planetas
            </div>
        </div>

        <div class="flex flex-col items-center gap-6">
            <button onclick="explorarSistemas()" class="px-12 py-4 bg-black hover:bg-gray-800 text-white font-bold rounded-xl transition-all active:scale-95 shadow-xl shadow-gray-200 uppercase tracking-widest text-xs">
                Mostrar Planetas
            </button>
            
            <p id="log-consola" class="text-[10px] text-gray-400 font-mono uppercase tracking-widest">Estado: Listo</p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
