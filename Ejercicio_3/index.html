<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doble y Triple</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl shadow-emerald-100 border border-slate-100">
        
        <div class="text-center mb-8">
            <div class="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-inner">
                <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-emerald-950 uppercase tracking-tighter">
                Multi<span class="text-emerald-500">X</span>
            </h2>
            <p class="text-slate-500 mt-1 font-medium">Calcula el doble y el triple al instante</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="font-semibold text-sm text-slate-600 mb-1.5 block" for="numero">Introduce un número:</label>
                <input 
                    class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 outline-none text-lg font-bold text-emerald-900 transition-all text-center" 
                    id="numero" 
                    type="number" 
                    placeholder="Ej: 5"
                >
            </div>

            <button onclick="calcularDobleTriple()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-700 transition-all shadow-md shadow-emerald-200 active:scale-95 text-lg">
                Calcular Resultados
            </button>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 text-center">
                    <p class="text-xs text-emerald-700 font-bold uppercase tracking-widest">El Doble</p>
                    <p id="res-doble" class="text-3xl font-black text-emerald-900">0</p>
                </div>
                <div class="bg-emerald-900 p-4 rounded-2xl text-center">
                    <p class="text-xs text-emerald-200 font-bold uppercase tracking-widest">El Triple</p>
                    <p id="res-triple" class="text-3xl font-black text-white">0</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
