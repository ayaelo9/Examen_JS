<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Números Primos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { font-family: 'Fira Code', monospace; background-color: #020617; }
        .prime-card {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-200">

    <div class="prime-card w-full max-w-md rounded-3xl p-8 border border-amber-500/20">
        <!-- Encabezado -->
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-amber-500/10 rounded-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.040L3 6.263V12c0 5.523 4.477 10 10 10 5.523 0 10-4.477 10-10V6.263l-1.382-.723z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight uppercase">Analizador de Primos</h1>
            <p class="text-amber-500/60 text-[10px] font-bold mt-2 tracking-[0.3em]">VALIDACIÓN 2 - 100</p>
        </div>

        <!-- Formulario HTML con validación nativa -->
        <form id="primeForm" class="space-y-6" onsubmit="return false;">
            <div class="relative">
                <input 
                    type="number" 
                    id="userNumber" 
                    min="2" 
                    max="99" 
                    required 
                    placeholder="Introduce un número"
                    class="peer w-full bg-slate-950/50 border-2 border-slate-700 p-4 rounded-2xl text-amber-400 text-xl font-bold outline-none focus:border-amber-500 transition-all placeholder:text-slate-700"
                >
                <div class="mt-2 text-[10px] text-slate-500 flex justify-between px-2 uppercase font-bold">
                    <span>Mín: 2</span>
                    <span>Máx: 99</span>
                </div>
            </div>

            <button 
                id="btnCheck"
                class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-5 rounded-2xl transition-all shadow-lg shadow-amber-900/20 active:scale-95 uppercase text-sm tracking-widest"
            >
                Verificar Número
            </button>
        </form>

        <!-- Resultados -->
        <div id="resultBox" class="hidden mt-8 p-6 rounded-2xl border transition-all duration-500 text-center">
            <p id="resultText" class="text-sm font-bold leading-relaxed"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    
</body>
</html>
