<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Array Methods Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-grad { background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%); }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-blue-600">
                Data Explorer Engine
            </h1>
            <p class="text-slate-400 mt-2">Interactúa con los métodos de búsqueda de JavaScript en tiempo real.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Panel de Control (Izquierda) -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold mb-4 flex items-center">
                        <span class="w-2 h-6 bg-sky-500 rounded-full mr-3"></span>
                        Consola de Comandos
                    </h2>
                    
                    <div class="space-y-4">
                        <!-- Input de búsqueda -->
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Nombre del usuario</label>
                            <input id="searchInput" type="text" placeholder="Ej: Pepito..." 
                                class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                        </div>

                        <!-- Botones de Acción -->
                        <div class="grid grid-cols-1 gap-2 pt-2">
                            <button onclick="ejecutarFind()" class="bg-sky-600 hover:bg-sky-500 text-white py-2 rounded-lg font-medium transition-colors">
                                Ejecutar .find()
                            </button>
                            <button onclick="ejecutarFilter()" class="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-medium transition-colors">
                                Ejecutar .filter()
                            </button>
                            <button onclick="ejecutarFindIndex()" class="bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-medium transition-colors">
                                Ejecutar .findIndex()
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Resultado de la Operación -->
                <div id="resultBox" class="glass p-6 rounded-2xl border-l-4 border-sky-500 hidden animate-pulse">
                    <h3 class="text-xs uppercase tracking-widest text-sky-400 font-bold mb-2">Resultado</h3>
                    <div id="resultContent" class="text-sm font-mono text-slate-300"></div>
                </div>
            </div>

            <!-- Visualización de Datos (Derecha) -->
            <div class="lg:col-span-2">
                <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800/50">
                                <th class="p-4 font-semibold text-slate-400 uppercase text-xs">ID</th>
                                <th class="p-4 font-semibold text-slate-400 uppercase text-xs">Usuario</th>
                                <th class="p-4 font-semibold text-slate-400 uppercase text-xs">Rol</th>
                                <th class="p-4 font-semibold text-slate-400 uppercase text-xs">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="userTable">
                            <!-- Los datos se cargan dinámicamente -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

<script src="js/app.js"></script>

</body>
</html>
