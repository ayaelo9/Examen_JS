<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Palíndromos - Ejercicio 7.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">
  <a href="../index.html" style="position:fixed; bottom:20px; right:20px; background:#007ecc; color:white; width:50px; height:50px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-radius:50%; font-size:24px; z-index:9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;">🏠</a>

    <div class="w-full max-w-md bg-white/10 backdrop-blur-lg border border-white/20 p-10 rounded-[3rem] shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tighter italic">Analizador_Frases</h1>
            <p class="text-indigo-300 text-xs uppercase tracking-[0.4em] mt-2">Ejercicio 7.8</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-indigo-300 uppercase mb-2 ml-1">Ingresa una frase</label>
                <textarea id="inputFrase" rows="3" placeholder="Ej: Yo dono rosas, oro no doy." 
                    class="w-full bg-black/20 border border-white/10 p-5 rounded-2xl text-white text-lg outline-none focus:border-indigo-400 transition-all placeholder:text-white/20 resize-none"></textarea>
            </div>

            <button id="btnVerificar" 
                class="w-full bg-white text-indigo-900 font-black py-5 rounded-2xl transition-all hover:bg-indigo-100 active:scale-95 uppercase tracking-widest text-sm shadow-xl">
                ¿Es Palíndromo?
            </button>
        </div>

        <!-- Pantalla de Resultado -->
        <div id="resultadoContenedor" class="hidden mt-12 text-center">
            <span class="text-indigo-300/50 text-[10px] font-bold uppercase tracking-widest">Resultado del Análisis</span>
            <div id="textoResultado" class="text-2xl font-bold mt-4 leading-tight"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
