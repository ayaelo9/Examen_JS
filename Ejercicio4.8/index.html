<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="video-game-play-toad-mushroom-mario_108577.png" type="image/x-icon">
    <title>Arcade: Piedra, Papel, Tijera</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Press Start 2P', cursive; }
        .pixel-border {
            box-shadow: 
                0 -4px 0 0 #000, 0 4px 0 0 #000, 
                -4px 0 0 0 #000, 4px 0 0 0 #000,
                0 -8px 0 0 #ff00ff, 0 8px 0 0 #ff00ff, 
                -8px 0 0 0 #ff00ff, 8px 0 0 0 #ff00ff;
        }
        .neon-text { text-shadow: 2px 2px #ff00ff; }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <a href="../index.html" style="position:fixed; bottom:20px; right:20px; background:#007ecc; color:white; width:50px; height:50px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-radius:50%; font-size:24px; z-index:9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;">🏠</a>

    <!-- Consola Arcade -->
    <div class="max-w-md w-full bg-slate-900 p-8 pixel-border relative">
        
        <!-- Pantalla del Juego -->
        <div class="bg-black border-4 border-slate-700 p-6 mb-8 text-green-400 text-[10px] leading-relaxed shadow-[inset_0_0_20px_#00ff0033]">
            <h2 class="text-center text-cyan-400 mb-6 text-sm neon-text">PIEDRA PAPEL TIJERA</h2>
            
            <div class="space-y-3">
                <p class="text-yellow-400 italic">INSERT COIN...</p>
                <p>1. <span class="text-white">👊 PIEDRA</span></p>
                <p>2. <span class="text-white">✋ PAPEL</span></p>
                <p>3. <span class="text-white">✌️ TIJERA</span></p>
            </div>
        </div>

        <!-- Panel de Control -->
        <div class="space-y-6 text-center">
            <div>
                <label class="block text-white text-[8px] mb-4 uppercase tracking-tighter">Tu elección (1-3):</label>
                <input type="number" id="eleccionUsuario" 
                    class="w-24 bg-transparent border-b-4 border-cyan-400 text-cyan-400 text-3xl text-center outline-none transition-all focus:scale-110">
            </div>

            <button onclick="iniciarBatalla()" 
                class="w-full bg-yellow-400 hover:bg-yellow-300 text-black py-4 font-bold text-xs shadow-[4px_4px_0px_0px_#ca8a04] active:translate-y-1 active:shadow-none transition-all">
                ¡LUCHAR!
            </button>
        </div>

        <!-- Pantalla de Resultados (Pop-up) -->
        <div id="pantallaFinal" class="hidden absolute inset-0 bg-black/95 flex flex-col items-center justify-center p-6 text-center border-4 border-cyan-400">
            <p id="textoResultado" class="text-white text-[10px] leading-loose mb-8"></p>
            <button onclick="cerrarPantalla()" class="text-cyan-400 hover:text-white text-[8px] border-2 border-cyan-400 p-2">
                REINTENTAR?
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
