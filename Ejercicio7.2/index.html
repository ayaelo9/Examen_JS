<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Números pares</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: 'Poppins', sans-serif;
    }

    .glass{
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.08);
    }

    .number-card{
      animation: aparecer .4s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes aparecer{
      to{
        opacity:1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 flex items-center justify-center p-4">
  <a href="../index.html" style="position:fixed; bottom:20px; right:20px; background:#007ecc; color:white; width:50px; height:50px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-radius:50%; font-size:24px; z-index:9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;">🏠</a>

  <div class="w-full max-w-5xl">

    <div class="glass border border-white/10 rounded-3xl shadow-2xl overflow-hidden">

      <div class="bg-gradient-to-r from-indigo-600 via-violet-600 to-fuchsia-600 p-6 md:p-8">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

          <div>
            <p class="text-white/70 text-sm uppercase tracking-[4px]">
              JavaScript Exercise
            </p>

            <h1 class="text-2xl md:text-4xl font-bold text-white mt-2">
              Números pares del 100 al 0
            </h1>

            <p class="text-white/80 mt-3 text-sm md:text-base max-w-2xl">
              Mostrar en pantalla los números pares comprendidos entre 100 y 0 en orden descendente.
            </p>
          </div>

          <div class="hidden md:flex items-center justify-center w-24 h-24 rounded-full bg-white/10 border border-white/20">
            <span class="text-4xl">⚡</span>
          </div>

        </div>
      </div>

      <div class="p-5 md:p-8">

        <div class="flex flex-col sm:flex-row gap-4 mb-8">

          <button
            onclick="mostrarNumeros()"
            class="flex-1 bg-gradient-to-r from-indigo-500 to-fuchsia-500 hover:scale-[1.02] active:scale-95 transition-all duration-300 text-white font-semibold py-4 rounded-2xl shadow-lg"
          >
            Mostrar números
          </button>

          <button
            onclick="limpiar()"
            class="flex-1 border border-white/20 bg-white/5 hover:bg-white/10 transition-all duration-300 text-white font-semibold py-4 rounded-2xl"
          >
            Limpiar
          </button>

        </div>

        <div
          id="resultado"
          class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-4"
        >
        </div>

      </div>
    </div>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
