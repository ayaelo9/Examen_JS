<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
        <h2 class="text-emerald-500 font-black text-2xl mb-2 italic">FIBONACCI 7.5</h2>
        <p class="text-slate-500 text-xs uppercase font-bold mb-6">Generador de secuencia por array</p>

        <div class="space-y-4">
            <input type="number" id="inputUser" placeholder="Introduce un número (ej. 10)" 
                class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-emerald-400 outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all">

            <button onclick="calcularFibonacci()" 
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl transition-transform active:scale-95">
                GENERAR SECUENCIA
            </button>
        </div>

        <!-- El resultado aparecerá aquí -->
        <div id="resultadoContenedor" class="hidden mt-8 p-6 bg-emerald-500/5 border border-emerald-500/20 rounded-3xl">
            <p id="textoFibonacci" class="text-emerald-400 font-mono text-lg text-center break-words leading-relaxed"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
