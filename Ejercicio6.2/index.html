<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Lista de Compras</title>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-black flex items-center justify-center p-6">
  <a href="../index.html" style="position:fixed; bottom:20px; right:20px; background:#007ecc; color:white; width:50px; height:50px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-radius:50%; font-size:24px; z-index:9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;">🏠</a>

  <div class="w-full max-w-xl bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-6 text-white">

    <h1 class="text-3xl font-bold text-center mb-6">
      🛒 Lista de Compras
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">

      <input id="producto"
        type="text"
        placeholder="Producto"
        class="p-3 rounded-xl bg-white/10 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>

      <input id="precio"
        type="number"
        step="0.01"
        placeholder="Precio"
        class="p-3 rounded-xl bg-white/10 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>

      <button onclick="agregarProducto()"
        class="bg-indigo-500 hover:bg-indigo-600 transition rounded-xl font-semibold">
        Añadir
      </button>

    </div>

    <div id="lista" class="space-y-2 mt-4"></div>

    <div class="mt-6 flex justify-between items-center bg-white/10 p-4 rounded-xl">
      <span class="font-semibold">Total:</span>
      <span id="total" class="text-2xl font-bold text-green-400">€0.00</span>
    </div>

  </div>

  <script src="js/app.js"></script>

</body>
</html>
