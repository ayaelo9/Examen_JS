<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Pintura</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl shadow-rose-100 border border-rose-50">
        
        <div class="text-center mb-8">
            <div class="bg-rose-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-md">
                <svg class="w-8 h-8 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase">Pintar<span class="text-rose-500">Pared</span></h2>
            <p class="text-slate-400 text-sm font-medium">Cobertura: 12m² por litro</p>
        </div>

        <div class="space-y-4">
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Alto de la pared (m)</label>
                <input id="alto" type="number" step="0.1" class="border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-rose-400 outline-none font-bold text-slate-700 transition-all" placeholder="0.00">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Ancho de la pared (m)</label>
                <input id="ancho" type="number" step="0.1" class="border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-rose-400 outline-none font-bold text-slate-700 transition-all" placeholder="0.00">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Manos de pintura</label>
                <input id="manos" type="number" class="border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-rose-400 outline-none font-bold text-slate-700 transition-all" placeholder="1">
            </div>

            <button onclick="calcularLitros()" class="w-full bg-rose-500 text-white font-black py-4 rounded-xl hover:bg-rose-600 transition-all shadow-lg shadow-rose-200 active:scale-95 mt-4">
                Calcular Litros de Pintura
            </button>

            <div id="resultado" class="hidden bg-rose-50 p-6 rounded-2xl border-2 border-rose-100 text-center animate-bounce-short">
                <p class="text-rose-700 text-sm font-bold uppercase">Necesitarás aproximadamente:</p>
                <p class="text-4xl font-black text-rose-900"><span id="litros">0</span> Litros</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
