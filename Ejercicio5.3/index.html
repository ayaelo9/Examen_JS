<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Lista de Compras</title>
</head>
<body class="bg-gray-50 min-h-screen p-8 font-sans">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-3xl">🍅</span>
            <h1 class="text-2xl font-bold text-gray-800">Lista de Compras</h1>
        </div>

        <div class="bg-slate-800 text-white px-4 py-2 rounded-t-lg font-italic italic text-sm mb-6">
            Enunciado
        </div>

        <div class="flex flex-wrap items-center gap-4 mb-8">
            <label for="producto" class="text-gray-700 font-medium">Producto que deseas agregar:</label>
            <input type="text" id="producto-input" placeholder="Ejemplo: Pan" 
                   class="flex-1 min-w-[200px] border border-gray-300 px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
            <button onclick="agregarProducto()" 
                    class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-semibold px-8 py-2 rounded-md border border-blue-200 transition-colors">
                Agregar
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            <div id="lista-contenedor" class="border-2 border-gray-800 rounded-lg min-h-[300px] p-4 bg-white overflow-y-auto">
                <ul id="lista-productos" class="space-y-2 list-disc pl-5 text-gray-700">
                    </ul>
            </div>

            <div class="flex flex-col items-center justify-center">
                <div class="relative">
                    <svg class="w-48 h-48 text-blue-300" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                    <div class="absolute top-8 right-6 w-4 h-4 bg-red-500 rounded-full border-2 border-white"></div>
                </div>
                
                <p class="mt-4 text-lg font-medium text-gray-700">
                    Número de productos en el carrito: <span id="contador" class="text-red-600 font-bold text-xl">0</span>
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
