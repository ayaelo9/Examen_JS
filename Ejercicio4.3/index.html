<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Detector de Palabras Bonitas</title>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-6">
    <a href="../index.html" style="position:fixed; bottom:20px; right:20px; background:#007ecc; color:white; width:50px; height:50px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-radius:50%; font-size:24px; z-index:9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;">🏠</a>

    <div class="max-w-md w-full bg-[#1e293b] rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-slate-700 overflow-hidden">
        <!-- Encabezado Estilo Moderno -->
        <div class="bg-gradient-to-br from-cyan-500 to-blue-600 p-8 text-center">
            <h2 class="text-white text-2xl font-black uppercase tracking-tighter">Analizador Lingüístico</h2>
            <p class="text-cyan-100 text-xs mt-2 opacity-80 italic">Patrón de "Palabras Bonitas"</p>
        </div>

        <!-- Cuerpo del Ejercicio -->
        <div class="p-10">
            <div class="space-y-6">
                <div>
                    <label class="text-slate-400 text-[10px] uppercase tracking-widest font-bold ml-1">Ingresa una palabra</label>
                    <input type="text" id="palabraInput" 
                        class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white text-lg outline-none focus:border-cyan-400 transition-all placeholder:text-slate-600"
                        placeholder="Escribe aquí...">
                </div>

                <button onclick="verificarPalabra()" 
                    class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-[#0f172a] font-black rounded-2xl transition-all active:scale-95 shadow-lg shadow-cyan-500/20">
                    ANALIZAR AHORA
                </button>

                <!-- Párrafo de Resultado -->
                <div id="resultadoBox" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <p id="mensajeTexto" class="text-center p-5 rounded-2xl font-medium leading-relaxed border"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
