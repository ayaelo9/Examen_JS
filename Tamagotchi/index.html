<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patoso V1.2 | Edición M</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#020617] min-h-screen flex items-center justify-center p-6 select-none">

    <div class="relative max-w-md w-full bg-slate-800 rounded-[3rem] p-6 shadow-[0_0_50px_-12px_rgba(59,130,246,0.5)] border-t-4 border-slate-700 ring-8 ring-slate-900">
        
        <div class="bg-[#1e293b] rounded-2xl p-4 mb-8 border-4 border-slate-950 shadow-[inset_0_2px_20px_rgba(0,0,0,0.8)] relative overflow-hidden">
            
            <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#38bdf8 1px, transparent 0); background-size: 20px 20px;"></div>

            <div class="flex justify-between items-center relative z-10 mb-4">
                <div class="flex flex-col">
                    <span class="text-[10px] text-sky-400 font-bold tracking-[0.2em] uppercase" style="font-family: 'Rajdhani';">Estado del Sistema</span>
                    <h2 class="text-white text-xs" style="font-family: 'Press Start 2P';">PATOSO</h2>
                </div>
                <div id="battery" class="w-8 h-4 border-2 border-slate-500 rounded-sm relative flex items-center p-[1px]">
                    <div class="h-full bg-green-500 w-3/4"></div>
                </div>
            </div>

            <div class="flex justify-center my-6 relative z-10">
                <div id="pet-container" class="transition-all duration-300">
                    <svg id="pet-svg" class="w-32 h-32 drop-shadow-[0_20px_10px_rgba(0,0,0,0.5)]" viewBox="0 0 100 100">
                        <circle cx="50" cy="55" r="35" class="fill-yellow-400" id="color-body" />
                        <circle cx="50" cy="35" r="25" class="fill-yellow-400" id="color-head" />
                        <circle cx="40" cy="30" r="3" fill="#020617" />
                        <circle cx="60" cy="30" r="3" fill="#020617" />
                        <path d="M40 40 Q50 45 60 40" stroke="#fbbf24" stroke-width="5" fill="none" stroke-linecap="round" />
                    </svg>
                    <div id="thought-bubble" class="absolute -top-2 -right-2 bg-white text-black text-xl w-10 h-10 rounded-full flex items-center justify-center opacity-0 scale-0 transition-all duration-300 shadow-xl border-2 border-slate-900">😊</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-x-4 gap-y-3 relative z-10">
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Salud</span>
                        <span id="txt-salud" class="text-[8px] text-white">8/10</span>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full p-[1px]">
                        <div id="bar-salud" class="h-full bg-red-500 rounded-full transition-all duration-700" style="width: 80%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Felicidad</span>
                        <span id="txt-felicidad" class="text-[8px] text-white">10/10</span>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full p-[1px]">
                        <div id="bar-felicidad" class="h-full bg-pink-500 rounded-full transition-all duration-700" style="width: 100%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Energía</span>
                        <span id="txt-energia" class="text-[8px] text-white">5/10</span>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full p-[1px]">
                        <div id="bar-energia" class="h-full bg-yellow-500 rounded-full transition-all duration-700" style="width: 50%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Limpieza</span>
                        <span id="txt-limpieza" class="text-[8px] text-white">9/10</span>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full p-[1px]">
                        <div id="bar-limpieza" class="h-full bg-cyan-500 rounded-full transition-all duration-700" style="width: 90%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <button onclick="accion('duchar')" class="group relative aspect-square bg-slate-700 rounded-2xl shadow-[0_6px_0_0_#0f172a] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center border border-slate-600">
                <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">🚿</span>
                <span class="text-[8px] font-black text-slate-300 uppercase">Duchar</span>
            </button>
            <button onclick="accion('alimentar')" class="group relative aspect-square bg-slate-700 rounded-2xl shadow-[0_6px_0_0_#0f172a] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center border border-slate-600">
                <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">🍎</span>
                <span class="text-[8px] font-black text-slate-300 uppercase">Comer</span>
            </button>
            <button onclick="accion('jugar')" class="group relative aspect-square bg-slate-700 rounded-2xl shadow-[0_6px_0_0_#0f172a] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center border border-slate-600">
                <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">⚽</span>
                <span class="text-[8px] font-black text-slate-300 uppercase">Jugar</span>
            </button>
            <button onclick="accion('dormir')" class="group relative aspect-square bg-slate-700 rounded-2xl shadow-[0_6px_0_0_#0f172a] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center border border-slate-600">
                <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">💤</span>
                <span class="text-[8px] font-black text-slate-300 uppercase">Dormir</span>
            </button>
            <button onclick="accion('acariciar')" class="group relative aspect-square bg-slate-700 rounded-2xl shadow-[0_6px_0_0_#0f172a] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center border border-slate-600">
                <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">❤️</span>
                <span class="text-[8px] font-black text-slate-300 uppercase">Mimo</span>
            </button>
            <button onclick="accion('reprender')" class="group relative aspect-square bg-rose-900/50 rounded-2xl shadow-[0_6px_0_0_#450a0a] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center border border-rose-800">
                <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">⚠️</span>
                <span class="text-[8px] font-black text-rose-400 uppercase">Reñir</span>
            </button>
        </div>

        <div class="mt-8 bg-black/40 rounded-lg p-2 border border-white/5 font-mono">
            <p id="terminal" class="text-[10px] text-emerald-500 uppercase tracking-widest text-center italic">Listo para jugar...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
