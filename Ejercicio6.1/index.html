<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Ejercicio 6.1</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-6 text-white">
    <h1 class="text-2xl font-bold mb-4 text-center">Mes de número a letra</h1>

    <input id="mesInput" type="number" placeholder="Introduce un mes (1-12)"
      class="w-full p-3 rounded-xl text-black focus:outline-none focus:ring-4 focus:ring-indigo-400" />

    <button onclick="buscarMes()"
      class="w-full mt-4 bg-indigo-500 hover:bg-indigo-600 transition rounded-xl p-3 font-semibold">
      Buscar mes
    </button>

    <div id="resultado" class="mt-5 text-center text-lg font-medium"></div>
  </div>

<script src="js/app.js"></script>

</body>
</html>
